<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="seed-contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="seed-contact" />
      <input name="bot-field" />
      <input name="inquiryType" />
      <input name="companyName" />
      <input name="officeName" />
      <input name="name" />
      <input name="email" type="email" />
      <input name="phone" />
      <input name="websiteUrl" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
